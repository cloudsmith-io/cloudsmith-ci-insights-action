name: Package Insights Customer Workflow Example

on:
  workflow_dispatch:
    inputs:
      follow-up:
        description: 'Optional follow-up instructions (e.g. contact #security-team)'
        required: false
        default: ''

permissions: # This will need added to customer workflows to give the action required access
  contents: read
  actions: read  

jobs:
  customer-workflow:
    name: customer-workflow
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Dry-run pip install (capturing log)
        id: piplog
        run: |
          set -o pipefail
          echo "Running pip dry-run"
          pip install spotipy==2.3.0 --index-url "${{ secrets.CLOUDSMITH_INDEX_URL }}"

  insights:
    runs-on: ubuntu-latest
    needs: customer-workflow
    if: ${{ failure() }}
    permissions:
      contents: read
      actions: read  # required for gh api to list jobs/download logs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Cloudsmith Package Insights on previous job logs
        uses: ./
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
          job-name: customer-workflow
          follow-up: "We're putting new coversheets on all the TPS reports before they go out now. So if you could go ahead and try to remember to do that from now on, that'd be great."
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
