name: 'Cloudsmith Package Insights'
description: 'Reusable GitHub Action to check quarantine status and policy info for Cloudsmith packages using a Docker image.'
author: 'cloudsmith-io'
inputs:
  log:
    description: 'Build or Install log text (or a single line containing URLs) that may include a 403 for a package fetch.'
    required: true
  follow-up:
    description: 'Optional custom follow-up instructions to display in the output. eg which slack channel to message or person to contact for assistance'
    required: false
    default: ''
  api-key:
    description: 'Cloudsmith API key for authentication'
    required: true
  api-domain:
    description: 'API domain override'
    required: false
    default: 'api.cloudsmith.io'
  npm-domain:
    description: 'NPM domain override'
    required: false
    default: 'npm.cloudsmith.io'
  python-domain:
    description: 'Python/download domain override'
    required: false
    default: 'python.cloudsmith.io'
  docker-domain:
    description: 'Docker domain override'
    required: false
    default: 'docker.cloudsmith.io'
  download-domain:
    description: 'Download domain override'
    required: false
    default: 'dl.cloudsmith.io'

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.log }}
    - --follow-up
    - ${{ inputs.follow-up }}
    - --api-domain
    - ${{ inputs.api-domain }}
    - --npm-domain
    - ${{ inputs.npm-domain }}
    - --python-domain
    - ${{ inputs.python-domain }}
    - --docker-domain
    - ${{ inputs.docker-domain }}
    - --download-domain
    - ${{ inputs.download-domain }}
branding:
  icon: 'alert-triangle'
  color: 'red'
